<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Board</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 16px; }
    h1 { color: #333; }
    form { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
    input { padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; flex: 1; min-width: 120px; }
    button { padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer; }
    #add-btn { background: #4CAF50; color: white; }
    #error-msg { color: red; margin-bottom: 12px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #ddd; padding: 8px 12px; text-align: left; }
    th { background: #f4f4f4; }
    .del-btn { background: #e53935; color: white; }
  </style>
</head>
<body>
  <h1>Order Board</h1>
  <form id="order-form">
    <input id="customer" placeholder="Customer" required />
    <input id="item" placeholder="Item" required />
    <input id="quantity" type="number" placeholder="Qty" required min="1" />
    <input id="price" type="number" step="0.01" placeholder="Price" required min="0" />
    <button type="submit" id="add-btn">Add Order</button>
  </form>
  <p id="error-msg"></p>
  <table id="orders-table">
    <thead>
      <tr>
        <th>Customer</th><th>Item</th><th>Qty</th><th>Price</th><th>Status</th><th>Created</th><th></th>
      </tr>
    </thead>
    <tbody id="orders-body"></tbody>
  </table>
  <script src="/static/app.js"></script>
</body>
</html>
